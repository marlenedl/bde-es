<html lang="fr">
<head>
    <meta charset="utf-8" />

    <title>Connexion</title>
<link rel="shortcut icon" href="https://pbs.twimg.com/profile_images/2014585489228005377/QXfyRW9s.jpg" />
    <link rel="stylesheet" href="styles.css">
    <style>        /* Style spécifique pour la page de connexion */        body {            display: flex;            justify-content: center;            align-items: center;            min-height: 100vh;            background-color: #e6ecf2; /* Fond clair cohérent */        }        .login-container {            background: white;            padding: 30px;            border-radius: 8px;            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2);            width: 350px;            text-align: center;        }        .login-container h2 {            color: #003366;            margin-bottom: 20px;            border-bottom: none;        }        .login-form input {            width: 100%;            padding: 10px;            margin-bottom: 15px;            border: 1px solid #ccc;            border-radius: 4px;            box-sizing: border-box;        }        .login-form button {            background-color: #0066cc;            color: white;            padding: 10px;            border: none;            border-radius: 4px;            width: 100%;            cursor: pointer;            font-size: 1.1em;            font-weight: bold;        }        .error-message {            color: #e74c3c;            margin-top: 10px;            font-weight: bold;        }    </style>	<style>        body {            display: flex; justify-content: center; align-items: center;            min-height: 100vh; background-color: #e6ecf2;            margin: 0;            background-image: url('https://play-lh.googleusercontent.com/Picc1m6Otd7A9qcn62oYoQoD4hN8wgwCq3-gpUMxC2RR6lhJ_ClHs67nlNAIbqxld1xs=w416-h235-rw');            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;        }        .login-container {            background: white; padding: 30px; border-radius: 8px;            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2); width: 350px; text-align: center;        }        .login-container h2 { color: #003366; margin-bottom: 20px; border-bottom: none; }        .login-form input {            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;        }        .login-form button {            background-color: #0066cc; color: white; padding: 10px; border: none; border-radius: 4px; width: 100%;            cursor: pointer; font-size: 1.1em; font-weight: bold;        }        .error-message { color: #e74c3c; margin-top: 10px; font-weight: bold; }    </style>
</head>
<body>

 <div class="login-container">
<center><img src=https://upload.wikimedia.org/wikipedia/commons/d/d1/Logo_Banco_de_Espa%C3%B1a.jpg height=130 width=270></center>
    <h2>Customer Area Login</h2></br>
    <form id="login-form">
        <input type="text" id="clientCode" placeholder=" Client Code (Ex: 2804300160)" required></br>
        <input type="password" id="pin" placeholder="Password (Ex: 690141)" required></br></br>
        <button type="submit">Access my accounts</button>
        <p id="login-error" class="error" style="display: none; margin-top: 15px;"></p>
    </form>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="shared.js"></script>
<script>
// Ce script est maintenant ASYNCHRONE et utilise correctement 'await getUsers()'
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const clientCode = document.getElementById('clientCode').value.trim();
    const pin = document.getElementById('pin').value.trim();
    const errorMsg = document.getElementById('login-error');
    
    errorMsg.style.display = 'none';

    try {
        // CORRECTION MAJEURE : On attend la liste des utilisateurs de Firebase/LocalStorage
        const users = await getUsers(); 

        // Recherche de l'utilisateur dans la liste 'users'
        const user = users.find(u => u.clientCode === clientCode && u.pin === pin);
        
        if (user) {
            // Connexion réussie
            localStorage.setItem('currentUserCode', user.clientCode);
            window.location.href = 'dashboard.html';
        } else {
            // Identifiants incorrects
            errorMsg.textContent = "Code client ou PIN incorrect.";
            errorMsg.style.display = 'block';
        }
    } catch (error) {
        // Ce bloc est exécuté si la connexion à Firebase échoue (RÈGLES DE SÉCURITÉ !)
        console.error("Erreur durant la tentative de connexion:", error);
        errorMsg.textContent = "Erreur: Impossible d'accéder aux données utilisateur. Veuillez vérifier la configuration Firebase ou votre connexion.";
        errorMsg.style.display = 'block';
    }
});
</script>
</body>
</html>
